<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VirtualDreams</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #060010;
      --surface:      #0c0020;
      --surface-2:    #130030;
      --border:       #280050;
      --border-hi:    #7a00cc;
      --pink:         #ff2d78;
      --pink-bright:  #ff5499;
      --cyan:         #00e5ff;
      --purple:       #bf5fff;
      --text:         #f0e0ff;
      --text-muted:   #7a5a9a;
      --success:      #00ff9d;
      --error:        #ff3566;
      --font-display: 'VT323', monospace;
      --font-body:    'IBM Plex Mono', monospace;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(191, 95, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(191, 95, 255, 0.045) 1px, transparent 1px);
      background-size: 48px 48px;
      color: var(--text);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.05) 0px,
        rgba(0, 0, 0, 0.05) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 999;
    }

    .container {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      text-align: center;
    }

    .title {
      font-family: var(--font-display);
      font-size: 5rem;
      line-height: 1;
      color: var(--pink);
      letter-spacing: 0.06em;
      cursor: default;
      animation: logoBreathe 5s ease-in-out infinite, logoGlitch 11s linear infinite;
    }

    @keyframes logoBreathe {
      0%, 100% {
        text-shadow:
          0 0 8px  rgba(255, 45, 120, 0.9),
          0 0 24px rgba(255, 45, 120, 0.5),
          0 0 60px rgba(255, 45, 120, 0.2);
      }
      50% {
        text-shadow:
          0 0 14px rgba(255, 45, 120, 1),
          0 0 40px rgba(255, 45, 120, 0.7),
          0 0 90px rgba(255, 45, 120, 0.35),
          0 0 140px rgba(255, 45, 120, 0.12);
      }
    }

    @keyframes logoGlitch {
      0%, 82%, 100% {
        transform: none;
        text-shadow:
          0 0 8px  rgba(255, 45, 120, 0.9),
          0 0 24px rgba(255, 45, 120, 0.5),
          0 0 60px rgba(255, 45, 120, 0.2);
      }
      83% {
        transform: translateX(3px) skewX(-2deg);
        text-shadow:
          -3px 0 rgba(0, 229, 255, 0.85),
           3px 0 rgba(255, 45, 120, 0.85),
           0 0 30px rgba(255, 45, 120, 0.4);
        opacity: 0.85;
      }
      84% {
        transform: translateX(-3px) skewX(2deg);
        text-shadow:
           3px 0 rgba(0, 229, 255, 0.85),
          -3px 0 rgba(255, 45, 120, 0.85),
           0 0 30px rgba(255, 45, 120, 0.4);
        opacity: 0.9;
      }
      85% {
        transform: none;
        text-shadow:
          0 0 8px rgba(255, 45, 120, 0.9),
          0 0 24px rgba(255, 45, 120, 0.5),
          0 0 60px rgba(255, 45, 120, 0.2);
        opacity: 1;
      }
      86% {
        transform: translateX(2px);
        text-shadow:
          -2px 0 rgba(0, 229, 255, 0.7),
           2px 0 rgba(255, 45, 120, 0.7);
        opacity: 0.75;
      }
      87% {
        transform: none;
        text-shadow:
          0 0 8px rgba(255, 45, 120, 0.9),
          0 0 24px rgba(255, 45, 120, 0.5),
          0 0 60px rgba(255, 45, 120, 0.2);
        opacity: 1;
      }
    }

    .title:hover {
      animation: logoGlitchHover 0.45s steps(1) forwards, logoBreathe 5s ease-in-out infinite;
    }

    @keyframes logoGlitchHover {
      0%  { transform: translateX(4px) skewX(-3deg); text-shadow: -4px 0 var(--cyan), 4px 0 var(--pink); opacity: 0.7; }
      20% { transform: translateX(-4px) skewX(3deg); text-shadow: 4px 0 var(--cyan), -4px 0 var(--pink); opacity: 0.85; }
      40% { transform: translateX(2px); text-shadow: -2px 0 var(--cyan), 2px 0 var(--pink); opacity: 0.9; }
      60% { transform: translateX(-2px) skewX(1deg); text-shadow: 2px 0 var(--purple), -2px 0 var(--pink); opacity: 0.8; }
      80% { transform: translateX(1px); }
      100% {
        transform: none;
        text-shadow: 0 0 8px rgba(255,45,120,0.9), 0 0 24px rgba(255,45,120,0.5), 0 0 60px rgba(255,45,120,0.2);
        opacity: 1;
      }
    }

    .subtitle {
      font-size: 0.65rem;
      color: var(--cyan);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-top: 0.4rem;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.55);
    }

    .sep {
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        var(--pink),
        var(--purple),
        var(--cyan),
        var(--purple),
        var(--pink),
        transparent
      );
      background-size: 300% 100%;
      margin: 0.9rem auto 0;
      width: 72%;
      opacity: 0.7;
      animation: sepFlow 4s linear infinite;
    }

    @keyframes sepFlow {
      0%   { background-position: 0% 0; }
      100% { background-position: 100% 0; }
    }

    /* ── Input row ──────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    .query-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.65rem 0.9rem;
      font-family: var(--font-body);
      font-size: 0.78rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .query-input::placeholder {
      color: var(--text-muted);
    }

    .query-input:hover:not(:focus) {
      border-color: var(--border-hi);
    }

    .query-input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 1px rgba(255, 45, 120, 0.4),
                  0 0 18px rgba(255, 45, 120, 0.25);
    }

    .submit-btn {
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 3px;
      padding: 0.65rem 1.2rem;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.12s, box-shadow 0.12s;
      box-shadow: 0 0 14px rgba(255, 45, 120, 0.45);
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg,
        transparent 30%,
        rgba(255, 255, 255, 0.22) 50%,
        transparent 70%
      );
      transform: translateX(-100%);
      transition: none;
    }

    .submit-btn:hover:not(:disabled)::before {
      animation: btnShimmer 0.45s ease forwards;
    }

    @keyframes btnShimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--pink-bright);
      box-shadow: 0 0 28px rgba(255, 45, 120, 0.8),
                  0 0 8px  rgba(255, 45, 120, 0.5);
    }

    .submit-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ── Result card ─────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .card:not(.hidden) {
      border-color: var(--border-hi);
      box-shadow:
        0 0 0 1px rgba(122, 0, 204, 0.18),
        0 6px 32px rgba(122, 0, 204, 0.18);
      animation: cardIn 0.28s ease;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .card:not(.hidden):hover {
      border-color: var(--pink);
      box-shadow:
        0 0 0 1px rgba(255, 45, 120, 0.2),
        0 8px 40px rgba(255, 45, 120, 0.15);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Metadata ────────────────────────────────────── */
    .meta {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .thumb {
      width: 6.5rem;
      height: 3.65rem;
      object-fit: cover;
      border-radius: 2px;
      flex-shrink: 0;
      background: var(--surface-2);
      transition: filter 0.2s, transform 0.2s;
    }

    .thumb:hover {
      filter: saturate(1.4) brightness(1.1);
      transform: scale(1.04);
    }

    .meta-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.3rem;
      min-width: 0;
    }

    .video-title {
      font-size: 0.78rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .video-author {
      font-size: 0.68rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Status row ──────────────────────────────────── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(0, 229, 255, 0.4);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .icon-ok, .icon-err {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    .icon-ok  { color: var(--success); filter: drop-shadow(0 0 4px rgba(0, 255, 157, 0.7)); }
    .icon-err { color: var(--error);   filter: drop-shadow(0 0 4px rgba(255, 53, 102, 0.7)); }

    .status-text {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    /* ── Error detail ────────────────────────────────── */
    .error-detail {
      font-size: 0.68rem;
      color: var(--error);
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      word-break: break-all;
    }

    /* ── Audio player ────────────────────────────────── */
    .player-wrap {
      padding: 0.75rem 1rem;
    }

    audio {
      width: 100%;
      accent-color: var(--pink);
    }

    /* ── Utility ─────────────────────────────────────── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1 class="title">VirtualDreams</h1>
      <p class="subtitle">Vaporwave chorus maker</p>
      <div class="sep"></div>
    </div>

    <!-- Input -->
    <div class="input-row">
      <input
        id="query"
        type="text"
        placeholder="Paste a YouTube URL…"
        class="query-input"
      />
      <button id="submitBtn" class="submit-btn">Process</button>
    </div>

    <!-- Status / result card — hidden initially -->
    <div id="card" class="card hidden">

      <!-- Video metadata -->
      <div id="meta" class="meta hidden">
        <img id="thumb" src="" alt="thumbnail" class="thumb" />
        <div class="meta-text">
          <p id="videoTitle" class="video-title"></p>
          <p id="videoAuthor" class="video-author"></p>
        </div>
      </div>

      <!-- Status row -->
      <div class="status-row">
        <div id="spinner" class="spinner hidden"></div>
        <svg id="iconOk" class="icon-ok hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        <svg id="iconErr" class="icon-err hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        <span id="statusText" class="status-text"></span>
      </div>

      <!-- Error detail -->
      <p id="errorDetail" class="error-detail hidden"></p>

      <!-- Audio player -->
      <div id="playerWrap" class="player-wrap hidden">
        <audio id="player" controls></audio>
      </div>

    </div>

  </div>

  <script>
    const API = '';  // same origin

    const queryEl    = document.getElementById('query');
    const submitBtn  = document.getElementById('submitBtn');
    const card       = document.getElementById('card');
    const metaEl     = document.getElementById('meta');
    const thumb      = document.getElementById('thumb');
    const videoTitle = document.getElementById('videoTitle');
    const videoAuthor= document.getElementById('videoAuthor');
    const spinner    = document.getElementById('spinner');
    const iconOk     = document.getElementById('iconOk');
    const iconErr    = document.getElementById('iconErr');
    const statusText = document.getElementById('statusText');
    const errorDetail= document.getElementById('errorDetail');
    const playerWrap = document.getElementById('playerWrap');
    const player     = document.getElementById('player');

    let pollTimer = null;

    function isYouTubeUrl(q) {
      return /^https?:\/\/(www\.)?(youtube\.com|youtu\.be)\//.test(q.trim());
    }

    function setStatus(state, text) {
      spinner.classList.toggle('hidden', state !== 'loading');
      iconOk.classList.toggle('hidden', state !== 'ok');
      iconErr.classList.toggle('hidden', state !== 'error');
      statusText.textContent = text;
    }

    async function fetchMeta(url) {
      try {
        const res = await fetch(
          `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`
        );
        if (!res.ok) return;
        const data = await res.json();
        thumb.src = data.thumbnail_url || '';
        videoTitle.textContent = data.title || '';
        videoAuthor.textContent = data.author_name || '';
        metaEl.classList.remove('hidden');
      } catch (_) { /* metadata is best-effort */ }
    }

    async function fetchAudio(jobId) {
      const res = await fetch(`${API}/jobs/${jobId}/audio`);
      if (!res.ok) throw new Error(`Audio fetch failed: ${res.status}`);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      player.src = url;
      playerWrap.classList.remove('hidden');
      player.play().catch(() => {});
    }

    async function poll(jobId) {
      const res = await fetch(`${API}/jobs/${jobId}`);
      if (!res.ok) {
        setStatus('error', `Polling failed (${res.status})`);
        return;
      }
      const job = await res.json();

      if (job.status === 'pending') {
        setStatus('loading', 'Queued…');
      } else if (job.status === 'running') {
        setStatus('loading', 'Processing…');
      } else if (job.status === 'completed') {
        setStatus('ok', 'Done — loading audio…');
        clearInterval(pollTimer);
        try {
          await fetchAudio(jobId);
          setStatus('ok', 'Ready');
        } catch (e) {
          setStatus('error', 'Failed to load audio');
          errorDetail.textContent = e.message;
          errorDetail.classList.remove('hidden');
        }
        submitBtn.disabled = false;
      } else if (job.status === 'failed') {
        setStatus('error', 'Processing failed');
        errorDetail.textContent = job.error || '';
        errorDetail.classList.remove('hidden');
        clearInterval(pollTimer);
        submitBtn.disabled = false;
      }
    }

    async function submit() {
      const query = queryEl.value.trim();
      if (!query) return;

      // reset
      clearInterval(pollTimer);
      submitBtn.disabled = true;
      card.classList.remove('hidden');
      metaEl.classList.add('hidden');
      errorDetail.classList.add('hidden');
      playerWrap.classList.add('hidden');
      player.src = '';
      setStatus('loading', 'Submitting…');

      // fetch metadata early if it's a URL
      if (isYouTubeUrl(query)) fetchMeta(query);

      try {
        const res = await fetch(`${API}/jobs`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query }),
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const { job_id } = await res.json();
        setStatus('loading', 'Queued…');
        poll(job_id);
        pollTimer = setInterval(() => poll(job_id), 3000);
      } catch (e) {
        setStatus('error', 'Failed to submit job');
        errorDetail.textContent = e.message;
        errorDetail.classList.remove('hidden');
        submitBtn.disabled = false;
      }
    }

    submitBtn.addEventListener('click', submit);
    queryEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  </script>

</body>
</html>
