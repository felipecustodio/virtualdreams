<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VirtualDreams</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-top:       #ffe6f1;
      --bg-mid:       #ffd4ef;
      --bg-bottom:    #c9fbff;
      --surface:      rgba(255, 247, 252, 0.84);
      --surface-2:    rgba(255, 233, 245, 0.9);
      --surface-3:    rgba(201, 251, 255, 0.78);
      --border:       rgba(255, 138, 193, 0.35);
      --border-hi:    rgba(255, 109, 174, 0.7);
      --pink:         #ff5faa;
      --pink-bright:  #ff7bbf;
      --coral:        #ff8f89;
      --aqua:         #72ebf4;
      --aqua-deep:    #24cdd9;
      --lavender:     #bb9cff;
      --pearl:        #fffdfc;
      --text:         #5c2d4d;
      --text-muted:   #946f91;
      --success:      #26ba9d;
      --error:        #d95b7b;
      --font-display: 'Cormorant Garamond', serif;
      --font-body:    'IBM Plex Mono', monospace;
    }

    body {
      font-family: var(--font-body);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.72), transparent 32%),
        radial-gradient(circle at 12% 18%, rgba(255, 170, 214, 0.46), transparent 20%),
        radial-gradient(circle at 88% 10%, rgba(114, 235, 244, 0.34), transparent 22%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 44%, var(--bg-bottom) 100%);
      color: var(--text);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.22), transparent 45%),
        radial-gradient(circle at bottom, rgba(255, 255, 255, 0.45), transparent 48%);
      pointer-events: none;
      z-index: -1;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(255, 255, 255, 0.18) 0px,
        rgba(255, 255, 255, 0.18) 1px,
        transparent 1px,
        transparent 3px
      );
      opacity: 0.34;
      pointer-events: none;
      z-index: 999;
    }

    .container {
      width: 100%;
      max-width: 1120px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header {
      text-align: center;
      position: relative;
      padding: 0.75rem 0.75rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.52);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(255, 238, 246, 0.68)),
        radial-gradient(circle at top, rgba(255, 255, 255, 0.46), transparent 48%);
      box-shadow:
        0 22px 80px rgba(255, 121, 177, 0.18),
        0 10px 30px rgba(64, 182, 193, 0.12);
      backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .hero-scene {
      position: relative;
      height: 176px;
      border-radius: 22px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 196, 224, 0.82) 0%, rgba(255, 222, 236, 0.72) 34%, rgba(166, 249, 255, 0.6) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.6),
        inset 0 -18px 30px rgba(103, 221, 229, 0.12);
    }

    .header-actions {
      display: flex;
      justify-content: center;
      margin-top: 0.75rem;
    }

    .hero-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.3);
      color: var(--text);
      box-shadow: 0 10px 24px rgba(255, 126, 185, 0.12);
      backdrop-filter: blur(12px);
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
    }

    .hero-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.52);
      color: #331c2d;
    }

    .hero-link svg {
      width: 18px;
      height: 18px;
      stroke-width: 2.1;
    }

    .hero-scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), transparent 38%),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.14) 0 12px,
          rgba(255, 255, 255, 0.02) 12px 24px
        );
      mix-blend-mode: screen;
      opacity: 0.46;
    }

    .hero-scene::after {
      content: '';
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: 0;
      height: 44%;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(118, 240, 246, 0.32)),
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.14) 0 2px,
          rgba(255, 255, 255, 0) 2px 18px
        );
      clip-path: polygon(0 24%, 100% 0, 100% 100%, 0 100%);
      opacity: 0.8;
    }

    .sun {
      position: absolute;
      top: 8px;
      left: 50%;
      width: 158px;
      height: 158px;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.05) 0 12px,
          rgba(255, 255, 255, 0.2) 12px 14px
        ),
        linear-gradient(180deg, rgba(255, 230, 147, 0.96), rgba(255, 129, 178, 0.92) 58%, rgba(255, 103, 166, 0.96));
      box-shadow:
        0 0 55px rgba(255, 127, 184, 0.42),
        0 0 110px rgba(255, 208, 124, 0.2);
      opacity: 0.96;
    }

    .grid {
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -2px;
      height: 54%;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.25)),
        repeating-linear-gradient(
          90deg,
          rgba(255, 121, 177, 0.5) 0 2px,
          transparent 2px 72px
        ),
        repeating-linear-gradient(
          180deg,
          rgba(255, 121, 177, 0.52) 0 2px,
          transparent 2px 30px
        );
      transform: perspective(420px) rotateX(78deg);
      transform-origin: bottom;
      opacity: 0.68;
    }

    .title-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.55rem 1.25rem 1rem;
      z-index: 2;
    }

    .title {
      font-family: var(--font-display);
      font-size: clamp(2.6rem, 5.9vw, 4.5rem);
      line-height: 0.92;
      color: var(--pearl);
      letter-spacing: 0.045em;
      cursor: default;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
      max-width: 100%;
      text-shadow:
        0 6px 18px rgba(255, 120, 172, 0.35),
        0 0 30px rgba(255, 255, 255, 0.36);
      animation: titleFloat 7s ease-in-out infinite;
    }

    @keyframes titleFloat {
      0%, 100% {
        transform: translateY(0);
        text-shadow:
          0 6px 18px rgba(255, 120, 172, 0.35),
          0 0 30px rgba(255, 255, 255, 0.36);
      }
      50% {
        transform: translateY(-5px);
        text-shadow:
          0 10px 28px rgba(255, 120, 172, 0.42),
          0 0 42px rgba(255, 255, 255, 0.52);
      }
    }

    .title:hover {
      color: #ffffff;
    }

    .subtitle {
      font-size: 0.62rem;
      color: var(--text);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-top: 0.35rem;
      text-align: center;
      opacity: 0.82;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
    }

    .input-shell {
      width: min(100%, 560px);
      margin-inline: auto;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      padding: 0.55rem;
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 24px;
      background: rgba(255, 250, 253, 0.62);
      box-shadow: 0 12px 32px rgba(255, 143, 137, 0.08);
      backdrop-filter: blur(18px);
    }

    .query-input, .upload-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 0.85rem 1rem;
      font-family: var(--font-body);
      font-size: 0.76rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .query-input::placeholder {
      color: var(--text-muted);
    }

    .query-input:hover:not(:focus), .upload-input:hover:not(:focus) {
      border-color: var(--border-hi);
    }

    .query-input:focus, .upload-input:focus {
      border-color: var(--pink-bright);
      box-shadow: 0 0 0 1px rgba(255, 111, 177, 0.28),
                  0 0 22px rgba(114, 235, 244, 0.22);
    }

    .upload-input {
      color: var(--text-muted);
      cursor: pointer;
    }

    .upload-input::file-selector-button {
      margin-right: 0.85rem;
      border: none;
      border-radius: 12px;
      padding: 0.55rem 0.8rem;
      background: rgba(255, 111, 177, 0.14);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.7rem;
      cursor: pointer;
    }

    .input-note {
      font-size: 0.67rem;
      line-height: 1.6;
      color: var(--text-muted);
      text-align: center;
    }

    .input-note a {
      color: var(--pink);
      text-decoration: none;
    }

    .input-note a:hover {
      text-decoration: underline;
    }

    .submit-btn {
      background: linear-gradient(135deg, var(--pink) 0%, var(--coral) 100%);
      color: white;
      border: none;
      border-radius: 18px;
      padding: 0.85rem 1.3rem;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.12s, box-shadow 0.12s;
      box-shadow:
        0 14px 26px rgba(255, 111, 177, 0.18),
        0 0 0 1px rgba(255, 255, 255, 0.18) inset;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
    }

    .submit-btn svg {
      width: 15px;
      height: 15px;
      stroke-width: 2.1;
      flex-shrink: 0;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg,
        transparent 30%,
        rgba(255, 255, 255, 0.22) 50%,
        transparent 70%
      );
      transform: translateX(-100%);
      transition: none;
    }

    .submit-btn:hover:not(:disabled)::before {
      animation: btnShimmer 0.45s ease forwards;
    }

    @keyframes btnShimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    .submit-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--pink-bright) 0%, #ffaa86 100%);
      box-shadow:
        0 18px 36px rgba(255, 111, 177, 0.24),
        0 0 24px rgba(114, 235, 244, 0.18);
    }

    .submit-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
    }

    .card {
      background:
        linear-gradient(180deg, rgba(255, 248, 251, 0.88), rgba(255, 241, 248, 0.82));
      border: 1px solid var(--border);
      border-radius: 28px;
      overflow: hidden;
      width: min(100%, 560px);
      margin-inline: auto;
      box-shadow: 0 18px 48px rgba(255, 143, 137, 0.08);
      backdrop-filter: blur(18px);
    }

    .card:not(.hidden) {
      border-color: var(--border-hi);
      box-shadow:
        0 0 0 1px rgba(255, 111, 177, 0.14),
        0 24px 60px rgba(255, 143, 137, 0.14);
      animation: cardIn 0.28s ease;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .card:not(.hidden):hover {
      border-color: var(--pink);
      box-shadow:
        0 0 0 1px rgba(255, 111, 177, 0.2),
        0 28px 64px rgba(114, 235, 244, 0.14);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .meta {
      display: flex;
      gap: 0.75rem;
      padding: 0.95rem 1rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.34), rgba(201, 251, 255, 0.18));
    }

    .thumb {
      width: 6.5rem;
      height: 3.65rem;
      object-fit: cover;
      border-radius: 14px;
      flex-shrink: 0;
      background: var(--surface-2);
      transition: filter 0.2s, transform 0.2s;
      box-shadow: 0 12px 22px rgba(255, 143, 137, 0.12);
    }

    .thumb:hover {
      filter: saturate(1.4) brightness(1.1);
      transform: scale(1.04);
    }

    .meta-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.3rem;
      min-width: 0;
    }

    .video-title {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .video-author {
      font-size: 0.68rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--aqua-deep);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
      box-shadow: 0 0 8px rgba(36, 205, 217, 0.3);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .icon-ok, .icon-err {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    .icon-ok  { color: var(--success); filter: drop-shadow(0 0 5px rgba(38, 186, 157, 0.3)); }
    .icon-err { color: var(--error);   filter: drop-shadow(0 0 5px rgba(217, 91, 123, 0.25)); }

    .status-text {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    .error-detail {
      font-size: 0.68rem;
      color: var(--error);
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      word-break: break-all;
      background: rgba(255, 228, 236, 0.5);
    }

    .player-wrap {
      padding: 0.95rem 1rem 1rem;
    }

    audio {
      width: 100%;
      accent-color: var(--pink);
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }

      .header {
        padding: 0.65rem 0.65rem 0.9rem;
      }

      .hero-scene {
        height: 150px;
      }

      .sun {
        width: 114px;
        height: 114px;
      }

      .input-row {
        flex-direction: column;
      }

      .submit-btn {
        width: 100%;
      }

      .title-wrap {
        padding: 0.4rem 0.85rem 0.8rem;
      }

      .title {
        font-size: clamp(1.72rem, 9vw, 2.7rem);
        letter-spacing: 0.02em;
        line-height: 0.98;
      }

      .subtitle {
        font-size: 0.48rem;
        letter-spacing: 0.13em;
        margin-top: 0.28rem;
      }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="hero-scene" aria-hidden="true">
        <div class="sun"></div>
        <div class="grid"></div>
        <div class="title-wrap">
          <h1 class="title">VirtualDreams</h1>
          <p class="subtitle">Vaporwave chorus maker</p>
        </div>
      </div>
      <div class="header-actions">
        <a
          class="hero-link"
          href="https://github.com/felipecustodio/virtualdreams/"
          target="_blank"
          rel="noreferrer"
          aria-label="View project on GitHub"
        >
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.426 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.009-.866-.014-1.699-2.782.605-3.369-1.344-3.369-1.344-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.004.071 1.532 1.033 1.532 1.033.892 1.53 2.341 1.088 2.91.832.091-.647.349-1.088.635-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.027A9.564 9.564 0 0 1 12 6.844a9.53 9.53 0 0 1 2.504.337c1.909-1.297 2.748-1.027 2.748-1.027.546 1.378.202 2.397.1 2.65.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.31.678.921.678 1.857 0 1.34-.012 2.422-.012 2.75 0 .268.18.58.688.481A10.02 10.02 0 0 0 22 12.017C22 6.484 17.523 2 12 2Z"/>
          </svg>
        </a>
      </div>
    </div>

    <!-- Input -->
    <div class="input-shell">
      <div class="input-row">
        <input
          id="query"
          type="text"
          placeholder="Paste a YouTube URL…"
          class="query-input"
        />
        <input
          id="audioFile"
          type="file"
          accept="audio/*,.wav,.mp3,.m4a,.aac,.ogg,.flac"
          class="upload-input hidden"
        />
        <button id="submitBtn" class="submit-btn">
          <i data-lucide="sparkles"></i>
          <span id="submitLabel">Process</span>
        </button>
      </div>
      <p id="inputNote" class="input-note"></p>
    </div>

    <!-- Status / result card — hidden initially -->
    <div id="card" class="card hidden">

      <!-- Video metadata -->
      <div id="meta" class="meta hidden">
        <img id="thumb" src="" alt="thumbnail" class="thumb" />
        <div class="meta-text">
          <p id="videoTitle" class="video-title"></p>
          <p id="videoAuthor" class="video-author"></p>
        </div>
      </div>

      <!-- Status row -->
      <div class="status-row">
        <div id="spinner" class="spinner hidden"></div>
        <svg id="iconOk" class="icon-ok hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        <svg id="iconErr" class="icon-err hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        <span id="statusText" class="status-text"></span>
      </div>

      <!-- Error detail -->
      <p id="errorDetail" class="error-detail hidden"></p>

      <!-- Audio player -->
      <div id="playerWrap" class="player-wrap hidden">
        <audio id="player" controls></audio>
      </div>

    </div>

  </div>

  <script>
    const API = '';  // same origin

    const queryEl    = document.getElementById('query');
    const audioFileEl= document.getElementById('audioFile');
    const inputNoteEl= document.getElementById('inputNote');
    const submitBtn  = document.getElementById('submitBtn');
    const submitLabel= document.getElementById('submitLabel');
    const card       = document.getElementById('card');
    const metaEl     = document.getElementById('meta');
    const thumb      = document.getElementById('thumb');
    const videoTitle = document.getElementById('videoTitle');
    const videoAuthor= document.getElementById('videoAuthor');
    const spinner    = document.getElementById('spinner');
    const iconOk     = document.getElementById('iconOk');
    const iconErr    = document.getElementById('iconErr');
    const statusText = document.getElementById('statusText');
    const errorDetail= document.getElementById('errorDetail');
    const playerWrap = document.getElementById('playerWrap');
    const player     = document.getElementById('player');

    let eventStream = null;
    let playerUrl = null;
    let appConfig = { youtube_input_enabled: true };

    window.lucide?.createIcons();

    async function loadConfig() {
      try {
        const res = await fetch(`${API}/config`);
        if (res.ok) {
          appConfig = await res.json();
        }
      } catch (_) {
        appConfig = { youtube_input_enabled: true };
      }
      applyInputMode();
    }

    function applyInputMode() {
      const youtubeMode = Boolean(appConfig.youtube_input_enabled);
      queryEl.classList.toggle('hidden', !youtubeMode);
      audioFileEl.classList.toggle('hidden', youtubeMode);
      submitLabel.textContent = youtubeMode ? 'Process' : 'Upload';

      if (youtubeMode) {
        queryEl.placeholder = 'Paste a YouTube URL or search query…';
        inputNoteEl.textContent = 'Local mode: paste a YouTube URL or search query.';
      } else {
        inputNoteEl.innerHTML = 'Hosted mode: upload an audio file here. To use YouTube links, run VirtualDreams locally from <a href="https://github.com/felipecustodio/virtualdreams/" target="_blank" rel="noreferrer">the project on GitHub</a>.';
      }
    }

    function isYouTubeUrl(q) {
      return /^https?:\/\/(www\.)?(youtube\.com|youtu\.be)\//.test(q.trim());
    }

    function setStatus(state, text) {
      spinner.classList.toggle('hidden', state !== 'loading');
      iconOk.classList.toggle('hidden', state !== 'ok');
      iconErr.classList.toggle('hidden', state !== 'error');
      statusText.textContent = text;
    }

    async function fetchMeta(url) {
      try {
        const res = await fetch(
          `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`
        );
        if (!res.ok) return;
        const data = await res.json();
        thumb.src = data.thumbnail_url || '';
        videoTitle.textContent = data.title || '';
        videoAuthor.textContent = data.author_name || '';
        metaEl.classList.remove('hidden');
      } catch (_) { /* metadata is best-effort */ }
    }

    async function fetchAudio(jobId) {
      const res = await fetch(`${API}/jobs/${jobId}/audio`);
      if (!res.ok) throw new Error(`Audio fetch failed: ${res.status}`);
      const blob = await res.blob();
      if (playerUrl) URL.revokeObjectURL(playerUrl);
      playerUrl = URL.createObjectURL(blob);
      player.src = playerUrl;
      playerWrap.classList.remove('hidden');
      player.play().catch(() => {});
    }

    function closeEventStream() {
      if (eventStream) {
        eventStream.close();
        eventStream = null;
      }
    }

    function openJobEvents(jobId) {
      closeEventStream();
      eventStream = new EventSource(`${API}/jobs/${jobId}/events`);

      eventStream.onmessage = async (event) => {
        const job = JSON.parse(event.data);

        if (job.status === 'pending') {
          setStatus('loading', 'Queued…');
        } else if (job.status === 'running') {
          setStatus('loading', 'Processing…');
        } else if (job.status === 'completed') {
          setStatus('ok', 'Done — loading audio…');
          closeEventStream();
          try {
            await fetchAudio(jobId);
            setStatus('ok', 'Ready');
          } catch (e) {
            setStatus('error', 'Failed to load audio');
            errorDetail.textContent = e.message;
            errorDetail.classList.remove('hidden');
          }
          submitBtn.disabled = false;
        } else if (job.status === 'failed') {
          setStatus('error', 'Processing failed');
          errorDetail.textContent = job.error || '';
          errorDetail.classList.remove('hidden');
          closeEventStream();
          submitBtn.disabled = false;
        }
      };

      eventStream.onerror = () => {
        setStatus('error', 'Event stream disconnected');
        errorDetail.textContent = 'Lost connection to job status updates';
        errorDetail.classList.remove('hidden');
        closeEventStream();
        submitBtn.disabled = false;
      };
    }

    async function submit() {
      const youtubeMode = Boolean(appConfig.youtube_input_enabled);
      const query = queryEl.value.trim();
      const file = audioFileEl.files?.[0];

      if (youtubeMode && !query) return;
      if (!youtubeMode && !file) return;

      // reset
      closeEventStream();
      submitBtn.disabled = true;
      card.classList.remove('hidden');
      metaEl.classList.add('hidden');
      errorDetail.classList.add('hidden');
      playerWrap.classList.add('hidden');
      errorDetail.textContent = '';
      if (playerUrl) {
        URL.revokeObjectURL(playerUrl);
        playerUrl = null;
      }
      player.src = '';
      setStatus('loading', 'Submitting…');

      // fetch metadata early if it's a URL
      if (youtubeMode && isYouTubeUrl(query)) fetchMeta(query);

      try {
        let res;
        if (youtubeMode) {
          res = await fetch(`${API}/jobs`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query }),
          });
        } else {
          const formData = new FormData();
          formData.append('file', file);
          res = await fetch(`${API}/jobs/upload`, {
            method: 'POST',
            body: formData,
          });
        }
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const { job_id } = await res.json();
        setStatus('loading', youtubeMode ? 'Queued…' : 'Upload received…');
        openJobEvents(job_id);
      } catch (e) {
        setStatus('error', 'Failed to submit job');
        errorDetail.textContent = e.message;
        errorDetail.classList.remove('hidden');
        closeEventStream();
        submitBtn.disabled = false;
      }
    }

    submitBtn.addEventListener('click', submit);
    queryEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    loadConfig();
  </script>

</body>
</html>
