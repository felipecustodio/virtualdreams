services:
  virtualdreams:
    build: .
    ports:
      - "8443:8443"
    environment:
      - TOKEN=${TOKEN}
      - PORT=8443
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./cache:/app/cache
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  redis_data: