        </video>
        </div>

        <script>
                var audio = document.getElementById("audio");
                audio.volume = 0.3;
        </script>

        <script type="text/javascript">
            // Replace jQuery with vanilla JavaScript
            document.addEventListener('DOMContentLoaded', function() {
                // Remove fade-out class when document is ready
                document.body.classList.remove('fade-out');
                
                // Enhanced mobile video handling
                var video = document.querySelector('.fullscreen-bg__video');
                if (video) {
                    // Attempt to play video on mobile after user interaction
                    var playVideo = function() {
                        video.play().catch(function(error) {
                            console.log('Video autoplay prevented:', error);
                        });
                    };
                    
                    // Try to play immediately
                    playVideo();
                    
                    // Also try to play after first user interaction
                    var hasPlayed = false;
                    document.addEventListener('touchstart', function() {
                        if (!hasPlayed) {
                            playVideo();
                            hasPlayed = true;
                        }
                    }, { once: true });
                    
                    document.addEventListener('click', function() {
                        if (!hasPlayed) {
                            playVideo();
                            hasPlayed = true;
                        }
                    }, { once: true });
                }
            });
        </script>
